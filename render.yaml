# Render Blueprint (Infrastructure as Code)
# Deploys FastAPI Backend (SQLite) and React Frontend

services:
  # 1. FastAPI Backend
  - type: web
    name: kashf-backend
    env: python
    plan: free
    region: ohio
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./kashf.db"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HIBP_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"

  # 2. React Frontend
  - type: web
    name: kashf-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
